<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Calculadora</title>
</head>
<body>
    <main class="calculadora">
        <div class="display-container">
            <output class="display" value="0">0</output>
        </div>
        
        <div class="botoes-container">
            <button type="button" class="tecla tecla-operacao" value="AC">AC</button>
            <button type="button" class="tecla tecla-operacao" value="DEL">DEL</button>
            <button type="button" class="tecla tecla-operacao" value="/">÷</button>
            <button type="button" class="tecla tecla-operacao" value="*">×</button>
            
            <button type="button" class="tecla tecla-numero" value="7">7</button>
            <button type="button" class="tecla tecla-numero" value="8">8</button>
            <button type="button" class="tecla tecla-numero" value="9">9</button>
            <button type="button" class="tecla tecla-operacao" value="-">-</button>
            
            <button type="button" class="tecla tecla-numero" value="4">4</button>
            <button type="button" class="tecla tecla-numero" value="5">5</button>
            <button type="button" class="tecla tecla-numero" value="6">6</button>
            <button type="button" class="tecla tecla-operacao" value="+">+</button>
            
            <button type="button" class="tecla tecla-numero" value="1">1</button>
            <button type="button" class="tecla tecla-numero" value="2">2</button>
            <button type="button" class="tecla tecla-numero" value="3">3</button>
            <button type="button" class="tecla tecla-igual" value="=" rowspan="2">=</button>
            
            <button type="button" class="tecla tecla-numero tecla-zero" value="0">0</button>
            <button type="button" class="tecla tecla-numero" value=".">.</button>
        </div>
    </main>
    <script src="./script.js"></script>
</body>
</html>
